<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews - TravelExplore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/custom.css?v=3" rel="stylesheet">
</head>
<body style="background-color: #e6e6fa;">
    <!-- Navigation -->
    <nav class="bg-gradient-to-r from-blue-200 to-purple-200 shadow-lg fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <i class="fas fa-plane text-primary text-2xl mr-2"></i>
                    <span class="text-xl font-bold text-gray-800">TravelExplore</span>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="index.html" class="text-gray-600 hover:text-primary transition">Home</a>
                    <a href="destinations.html" class="text-gray-600 hover:text-primary transition">Destinations</a>
                    <a href="reviews.html" class="text-primary font-semibold">Reviews</a>
                    <div id="authSection">
                        <button id="loginBtn" class="bg-primary text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition">Login</button>
                        <div id="userSection" class="hidden flex items-center space-x-4">
                            <span id="welcomeMsg" class="text-gray-700 font-medium"></span>
                            <button id="logoutBtn" class="bg-gradient-to-r from-red-300 to-pink-300 text-gray-800 px-4 py-2 rounded-lg hover:from-red-400 hover:to-pink-400 transition font-semibold">Logout</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <section class="pt-24 pb-12 bg-gradient-to-r from-pink-300 to-orange-300 text-gray-800">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <h1 class="text-4xl font-bold mb-4">Travel Reviews</h1>
            <p class="text-xl">Read authentic experiences from fellow travelers</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-7xl mx-auto px-4">
            <div id="reviewsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Reviews loaded here -->
            </div>
        </div>
    </section>

    <div id="deleteModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center">
        <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4">
            <h3 class="text-xl font-bold mb-4">Delete Review</h3>
            <p class="text-gray-600 mb-6">Are you sure you want to delete this review?</p>
            <div class="flex gap-4">
                <button id="confirmDelete" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition">Delete</button>
                <button id="cancelDelete" class="bg-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-400 transition">Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/reviews.js"></script>
</body>
</html>
